<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideHustle Radar</title>
  <link rel="stylesheet" href="./styles.css?v=20260305-0552" />
</head>
<body>
  <header>
    <div class="container">
      <h1>副业信息雷达 · SideHustle Radar</h1>
      <div class="sub">多平台线索聚合 + 评分筛选（程序员友好）</div>
    </div>
  </header>

  <main class="container">
    <section class="filters">
      <input id="q" placeholder="搜索关键词（PHP / 自动化 / 公众号 / TG...）" />
      <select id="platform" data-placeholder="全部平台">
        <option value="">全部平台</option>
      </select>
      <select id="type" data-placeholder="全部类型">
        <option value="">全部类型</option>
      </select>
      <select id="risk" data-placeholder="全部风险">
        <option value="">全部风险</option>
        <option value="ok">优先</option>
        <option value="mid">观察</option>
        <option value="bad">高风险</option>
      </select>
      <select id="skill" data-placeholder="全部技能">
        <option value="">全部技能</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;padding:10px;border:1px solid var(--line);border-radius:10px;">
        <input id="executableOnly" type="checkbox" style="width:auto;" />
        <span style="font-size:12px;color:var(--muted);">仅看可执行（>=2要素）</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;padding:10px;border:1px solid var(--line);border-radius:10px;">
        <input id="unreadOnly" type="checkbox" style="width:auto;" />
        <span style="font-size:12px;color:var(--muted);">仅看未读</span>
      </label>
    </section>

    <section class="kpis">
      <div class="kpi"><div class="n" id="k-total">0</div><div class="l">线索总数</div></div>
      <div class="kpi"><div class="n" id="k-ok">0</div><div class="l">可优先跟进</div></div>
      <div class="kpi"><div class="n" id="k-mid">0</div><div class="l">可观察</div></div>
      <div class="kpi"><div class="n" id="k-bad">0</div><div class="l">高风险</div></div>
    </section>

    <section class="today-panel">
      <div class="today-head">
        <div>
          <strong>今日优先</strong>
          <div class="meta" style="margin:4px 0 0 0;">先看最可能带来收入/省钱的 5 条</div>
        </div>
      </div>
      <div id="todayList" class="today-list"></div>
    </section>

    <section class="toolbar">
      <span id="lastUpdated" class="meta" style="margin:0;">最后更新：--</span>
      <span id="importStatus" class="meta" style="margin:0;">导入状态：--</span>
      <button id="opportunityPreset" class="tag" style="cursor:pointer;background:transparent;">只看机会</button>
      <button id="inspirationPreset" class="tag" style="cursor:pointer;background:transparent;">只看灵感</button>
      <button id="savingsPreset" class="tag" style="cursor:pointer;background:transparent;">只看省钱</button>
      <button id="observationPreset" class="tag" style="cursor:pointer;background:transparent;">观察池</button>
      <button id="devPreset" class="tag" style="cursor:pointer;background:transparent;">程序员可接单</button>
      <button id="clearPreset" class="tag" style="cursor:pointer;background:transparent;">清空预设</button>
      <button id="markAllRead" class="tag" style="cursor:pointer;background:transparent;">本页标为已读</button>
      <button id="refreshNow" class="tag" style="cursor:pointer;background:transparent;">立即刷新</button>
    </section>

    <section id="list" class="list"></section>

    <section id="pager" class="pager">
      <button id="prevPage" class="tag" style="cursor:pointer;background:transparent;">上一页</button>
      <span id="pageInfo" class="meta" style="margin:0;">第 1 / 1 页</span>
      <button id="nextPage" class="tag" style="cursor:pointer;background:transparent;">下一页</button>
      <span class="meta" style="margin:0 0 0 8px;">每页</span>
      <select id="pageSize" style="width:auto;min-width:90px;">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
      </select>
    </section>
  </main>

  <div id="detailModal">
    <div class="modal-panel">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
        <h3 id="d-title" style="margin:0;font-size:18px;"></h3>
        <button id="d-close" class="tag" style="cursor:pointer;background:transparent;">关闭</button>
      </div>
      <div id="d-meta" class="meta" style="margin-top:8px;"></div>
      <div id="d-tags" class="tags" style="margin-top:8px;"></div>
      <pre id="d-desc"></pre>
      <div id="d-notes" class="meta" style="margin-top:8px;"></div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
        <a id="d-link" target="_blank" rel="noreferrer" class="tag">打开原链接</a>
        <button id="d-copy" class="tag" style="cursor:pointer;background:transparent;">复制链接</button>
      </div>
    </div>
  </div>

  <script src="./app.js?v=20260307-0925"></script>
</body>
</html>
